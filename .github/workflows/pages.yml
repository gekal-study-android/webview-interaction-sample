name: Deploy Web to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
      # ロックファイルの解決結果を揃えるため web/package.json の packageManager と同じ版に固定する
      - name: Set up pnpm
        run: npm install -g pnpm@11.16.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Build static export
        run: pnpm build
        working-directory: web
        env:
          # vConsole を有効にするビルド時フラグ。リポジトリ変数 NEXT_PUBLIC_VCONSOLE を
          # true にすると公開サイトで有効になる（未設定なら無効）。
          NEXT_PUBLIC_VCONSOLE: ${{ vars.NEXT_PUBLIC_VCONSOLE }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/out
          # web/public/.nojekyll を成果物に含める
          include-hidden-files: true

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
