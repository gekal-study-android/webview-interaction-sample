<!DOCTYPE html>
<html>

<head>
    <title>WebView Example</title>
</head>

<body>
    <h1>WebView Example</h1>
    <button onclick="showToast()">Show Toast</button>

    <p id="message"></p>

    <div>
      <ul style="list-style-type: none;">
        <li><span>[※] First item（項目１）</span></li>
        <li><span>[※] Second item（項目２）</span></li>
        <li><span>[※] Third item（項目３）</span></li>
      </ul>
    </div>

    <script type="text/javascript">
        function showToast() {
            AndroidInterface.showToast("Hello from WebView!");
        }

        function handleReturnValue(value) {
            document.getElementById("message").innerText = "Received: " + value;
        }
    </script>
</body>

</html>
